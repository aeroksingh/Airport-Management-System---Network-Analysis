version: "3.8"

services:
  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: airport_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - airport_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airport_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/airportdb
      - JWT_SECRET=airport_super_secret_jwt_key_2024
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - airport_network

  # ── Frontend React App ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airport_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - airport_network

# ── Named Volumes ─────────────────────────────────────────
volumes:
  mongo_data:

# ── Networks ──────────────────────────────────────────────
networks:
  airport_network:
    driver: bridge
